<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LJQ-LRJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ff4d6d;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态渐变背景流光特效 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 顶部英文字体 */
        .title-en {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .title-cn {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 5px;
        }

        /* 计时器样式 */
        .timer-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
        }

        .timer-box {
            display: flex;
            flex-direction: column;
        }

        .timer-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .timer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* 打字机文字 */
        .message-area {
            min-height: 80px;
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 2rem;
        }

        /* 音乐控制按钮 */
        .music-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .music-btn:hover {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* 鼠标点击的心形特效 */
        .click-heart {
            position: absolute;
            pointer-events: none;
            color: var(--accent-color);
            animation: heart-float 1s ease-out forwards;
        }

        @keyframes heart-float {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body onclick="createHeart(event)">

    <canvas id="canvas-bg"></canvas>

    <div class="main-card">
        <div class="title-en">Love Journey</div>
        <div class="title-cn">致：我最亲爱的你</div>

        <div class="timer-container" id="timer">
            <div class="timer-box"><span class="timer-num" id="d">00</span><span class="timer-label">Days</span></div>
            <div class="timer-box"><span class="timer-num" id="h">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-box"><span class="timer-num" id="m">00</span><span class="timer-label">Min</span></div>
            <div class="timer-box"><span class="timer-num" id="s">00</span><span class="timer-label">Sec</span></div>
        </div>

        <div class="message-area" id="typewriter"></div>

        <button class="music-btn" id="musicBtn">开启浪漫氛围</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://api.uomg.com/api/rand.music?sort=%E7%83%AD%E6%AD%8C%E6%A6%9C" type="audio/mpeg">
    </audio>

    <script>
        // 1. 修改恋爱开始日期 (年, 月-1, 日, 时, 分, 秒)
        // 比如 2023年5月20日 13点14分：new Date(2023, 4, 20, 13, 14, 0)
        const startDate = new Date(2026, 3, 20, 13, 14, 0);

        // 2. 修改打字机文案
        const loveText = "在这个纷繁的世界里 遇见你是我生命中最动人的意外";

        // 计时器函数
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);

        // 打字机效果
        let i = 0;
        function typeWriter() {
            if (i < loveText.length) {
                document.getElementById("typewriter").innerHTML += loveText.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            }
        }
        setTimeout(typeWriter, 1000);

        // 音乐控制
        const musicBtn = document.getElementById('musicBtn');
        const audio = document.getElementById('bgMusic');
        musicBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                musicBtn.innerText = "正在聆听浪漫";
            } else {
                audio.pause();
                musicBtn.innerText = "开启浪漫氛围";
            }
        };

        // 鼠标点击生成爱心特效
        function createHeart(e) {
            const heart = document.createElement('div');
            heart.classList.add('click-heart');
            heart.innerHTML = '❤️';
            heart.style.left = e.clientX - 10 + 'px';
            heart.style.top = e.clientY - 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        // 背景粒子动效
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.001;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 77, 109, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.3) {
                    particles.splice(i, 1);
                    i--;
                    particles.push(new Particle());
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        for (let i = 0; i < 100; i++) particles.push(new Particle());
        animate();
    </script>
</body>
</html>
